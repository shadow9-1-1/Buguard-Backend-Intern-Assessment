name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint:
    name: Lint & Format Code
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8

      - name: Check Code Formatting (Black)
        run: black --check app/

      - name: Lint Code (Flake8)
        run: flake8 app/ --max-line-length=120 --extend-ignore=E402,F401

  build-and-test:
    name: Build & Run API Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Environment Variables
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "API_KEY=${{ secrets.API_KEY }}" >> .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "ALGORITHM=${{ secrets.ALGORITHM }}" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}" >> .env

      - name: Build and Start Docker Containers
        run: |
          docker compose up --build -d
          # Give the database and API a few seconds to fully initialize
          sleep 10
          # Wait until the API is fully responsive
          curl --retry 10 --retry-delay 3 --retry-all-errors http://localhost:8000/docs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman Tests
        run: newman run test/Buguard_Assets_Postman_Collection.json

      - name: Dump Docker Logs on Failure
        if: failure()
        run: docker compose logs backend

      - name: Shut down Docker Containers
        if: always()
        run: docker compose down
